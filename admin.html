<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 助农平台</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; flex: 1; min-width: 150px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-card h3 { color: #2c5e2e; margin-bottom: 12px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #d35400; }
        .order-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; }
        .order-table th, .order-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 24px; text-align: center; }
        .hidden { display: none; }
        .top-product { margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🌾 乡野直达 · 管理后台</div>
        <nav>
            <a href="index.html">首页</a>
            <a href="cart.html">购物车</a>
            <a href="merchant.html">商家中心</a>
            <a href="admin.html" class="active">管理后台</a>
        </nav>
    </header>
    <main>
        <div id="adminContent" class="admin-container">
            <div id="adminLoginDiv" class="login-box">
                <h3>管理员登录</h3>
                <input type="password" id="adminPwd" placeholder="请输入密码">
                <button id="adminLoginBtn">登录</button>
                <p style="margin-top: 12px; color:#888;">默认密码：admin123</p>
            </div>
            <div id="adminPanel" class="hidden">
                <div class="stats">
                    <div class="stat-card"><h3>总订单数</h3><div class="number" id="totalOrders">0</div></div>
                    <div class="stat-card"><h3>总销售额</h3><div class="number" id="totalSales">¥0</div></div>
                </div>
                <div class="stat-card top-product">
                    <h3>📈 商品销售排行</h3>
                    <div id="topProductsList"></div>
                </div>
                <div style="margin-top: 30px;">
                    <h3>📋 订单列表</h3>
                    <table class="order-table">
                        <thead><tr><th>订单号</th><th>时间</th><th>商品明细</th><th>总金额</th><th>操作</th></tr></thead>
                        <tbody id="orderList"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <!-- 聊天记录管理（管理员可删除任何消息） -->
<div style="margin-top: 40px;">
    <h3>💬 聊天记录监控</h3>
    <div id="adminMessagesList" style="max-height: 500px; overflow-y: auto; background: white; border-radius: 16px; padding: 16px; border: 1px solid #eee;">
        <!-- 动态加载 -->
    </div>
</div>
    </main>
    <footer><p>© 2025 助农农产品交易平台 | 助农公益项目</p></footer>
    <script src="admin.js"></script>
</body>
</html>
