<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>助农农产品交易平台 - 首页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🌾 乡野直达 · 助农交易</div>
        <nav>
            <a href="index.html" class="active">首页</a>
            <a href="cart.html">购物车 <span id="cartCount" class="badge">0</span></a>
            <a href="merchant.html" target="_blank">📦 商家中心</a>
            <a href="admin.html" target="_blank">📊 管理后台</a>
        </nav>
    </header>

    <main>
        <h2>✨ 产地直发 新鲜到家</h2>
        <div class="search-bar" style="display: flex; justify-content: center; margin-bottom: 20px; gap: 12px;">
            <input type="text" id="searchInput" placeholder="🔍 搜索商品名称或产地..." style="flex: 1; max-width: 400px; padding: 10px 16px; border-radius: 40px; border: 1px solid #ccc; font-size: 16px;">
            <button id="searchBtn" style="background: #2c5e2e; color: white; border: none; padding: 0 20px; border-radius: 40px; cursor: pointer;">搜索</button>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </main>
<!-- 联系商家浮动按钮 -->
<div id="contactBtn" class="contact-btn">💬 联系商家</div>

<!-- 聊天窗口（默认隐藏） -->
<div id="chatWindow" class="chat-window hidden">
    <div class="chat-header">
        <span>与商家对话</span>
        <button id="closeChatBtn">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="输入消息...">
        <button id="sendMsgBtn">发送</button>
    </div>
</div>
    <footer>
        <p>© 2025 助农农产品交易平台 | 助农公益项目</p >
    </footer>

    <script src="script.js"></script>
    <script>
        // 页面加载时渲染商品列表并更新购物车角标
        window.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCartBadge();
            // 绑定搜索事件
            const searchBtn = document.getElementById('searchBtn');
            const searchInput = document.getElementById('searchInput');
            if (searchBtn && searchInput) {
                const doSearch = () => {
                    renderProducts(searchInput.value);
                    // 重新绑定拖拽（因为renderProducts中已调用initDragToScroll，但需要确保网格重新生成了）
                };
                searchBtn.addEventListener('click', doSearch);
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') doSearch();
                });
            }
        });
    </script>
</body>
</html>
