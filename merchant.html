<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家中心 - 助农平台</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .merchant-container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .section { background: white; border-radius: 20px; padding: 20px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .section h3 { color: #2c5e2e; margin-bottom: 20px; border-left: 4px solid #ffb347; padding-left: 12px; }
        .product-form { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
        .product-form input, .product-form button { padding: 8px 12px; border-radius: 30px; border: 1px solid #ccc; }
        .product-form button { background: #2c5e2e; color: white; border: none; cursor: pointer; }
        .product-table { width: 100%; border-collapse: collapse; }
        .product-table th, .product-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .product-table img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .edit-btn, .del-btn { padding: 4px 12px; margin: 0 4px; border-radius: 20px; cursor: pointer; border: none; }
        .edit-btn { background: #ffb347; }
        .del-btn { background: #e67e22; color: white; }
        .message-item { padding: 12px; border-bottom: 1px solid #eee; }
        .reply-area { margin-top: 8px; display: flex; gap: 8px; }
        .reply-input { flex: 1; padding: 6px; border-radius: 20px; border: 1px solid #ccc; }
        .reply-btn { background: #2c5e2e; color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; }
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 24px; text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 30px; border: 1px solid #ccc; }
        .login-box button { background: #2c5e2e; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🌾 乡野直达 · 商家中心</div>
        <nav>
            <a href="index.html">首页</a>
            <a href="cart.html">购物车</a>
            <a href="merchant.html" class="active">商家中心</a>
            <a href="admin.html">管理后台</a>
        </nav>
    </header>
    <main>
        <div id="merchantContent" class="merchant-container">
            <!-- 登录界面 -->
            <div id="loginDiv" class="login-box">
                <h3>商家登录</h3>
                <input type="password" id="merchantPwd" placeholder="请输入密码">
                <button id="merchantLoginBtn">登录</button>
                <p style="margin-top: 12px; color:#888;">默认密码：merchant123</p>
            </div>
            <!-- 管理界面（初始隐藏） -->
            <div id="adminPanel" class="hidden">
                <div class="section">
                    <h3>➕ 添加新商品</h3>
                    <div class="product-form">
                        <input type="text" id="prodName" placeholder="商品名称">
                        <input type="number" id="prodPrice" placeholder="价格" step="0.1">
                        <input type="text" id="prodOrigin" placeholder="产地">
                        <input type="text" id="prodUnit" placeholder="单位（如5斤装）">
                        <input type="text" id="prodImg" placeholder="图片URL（可选）">
                        <button id="addProductBtn">添加商品</button>
                    </div>
                </div>
                <div class="section">
                    <h3>📦 商品管理</h3>
                    <table class="product-table" id="productTable">
                        <thead><tr><th>图片</th><th>名称</th><th>价格</th><th>产地</th><th>单位</th><th>操作</th></tr></thead>
                        <tbody id="productList"></tbody>
                    </table>
                </div>
                <div class="section">
                    <h3>💬 用户消息与回复</h3>
                    <div id="messagesList"></div>
                </div>
            </div>
        </div>
    </main>
    <footer><p>© 2025 助农农产品交易平台 | 助农公益项目</p></footer>
    <script src="merchant.js"></script>
</body>
</html>
